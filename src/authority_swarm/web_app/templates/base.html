<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Authority Swarm{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#ea580c',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex items-center gap-8">
                    <a href="/" class="flex items-center gap-2">
                        <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center text-white font-bold text-sm">AS</div>
                        <span class="font-semibold text-gray-900">Authority Swarm</span>
                    </a>
                    <div class="hidden md:flex items-center gap-1">
                        <a href="/" class="px-3 py-2 rounded-md text-sm font-medium {% if request.url.path == '/' %}text-brand bg-orange-50{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-50{% endif %}">Dashboard</a>
                        <a href="/landings" class="px-3 py-2 rounded-md text-sm font-medium {% if request.url.path.startswith('/landings') %}text-brand bg-orange-50{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-50{% endif %}">Landings</a>
                        <a href="/research" class="px-3 py-2 rounded-md text-sm font-medium {% if request.url.path.startswith('/research') %}text-brand bg-orange-50{% else %}text-gray-600 hover:text-gray-900 hover:bg-gray-50{% endif %}">Research</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
